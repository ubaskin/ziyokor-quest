<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ziyokor Quest — Bilim orollari</title>
<link rel="manifest" href="manifest.json">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; font-family:-apple-system,'Segoe UI',Roboto,sans-serif; background:#87c5f0; }
  #c { position:fixed; inset:0; display:block; }

  /* ---------- overlays ---------- */
  .ov { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:20; }
  .card { background:rgba(255,255,255,.96); border-radius:24px; padding:22px; width:min(480px,92vw);
          box-shadow:0 20px 60px rgba(0,40,90,.35); text-align:center; }

  /* start screen */
  #start { background:#4aa3e0; background-size:cover; background-position:center; }
  #start .card { backdrop-filter:blur(4px); background:rgba(255,255,255,.92); }
  #start h1 { font-size:30px; color:#1a5fb4; letter-spacing:.5px; }
  #start p.sub { color:#555; margin:6px 0 16px; font-size:14px; }
  #start input { width:100%; padding:14px; font-size:18px; border:2px solid #cfe3f7; border-radius:14px; text-align:center; margin-bottom:12px; outline:none; }
  #start input:focus { border-color:#4a9de0; }
  .grades { display:flex; gap:10px; margin-bottom:16px; }
  .grades button { flex:1; padding:14px 0; font-size:18px; font-weight:700; border:2px solid #cfe3f7; background:#fff; border-radius:14px; color:#1a5fb4; cursor:pointer; }
  .grades button.sel { background:#1a5fb4; color:#fff; border-color:#1a5fb4; }
  .big { width:100%; padding:16px; font-size:20px; font-weight:800; color:#fff; border:none; border-radius:16px;
         background:linear-gradient(135deg,#ff9a3d,#ff6a3d); cursor:pointer; box-shadow:0 6px 0 #d9541f; }
  .big:active { transform:translateY(3px); box-shadow:0 3px 0 #d9541f; }
  .big:disabled { opacity:.5; }

  /* HUD */
  #hud { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center;
         padding:10px 14px; z-index:10; pointer-events:none; }
  .pill { background:rgba(255,255,255,.9); border-radius:999px; padding:8px 16px; font-weight:800; font-size:16px;
          color:#1a5fb4; box-shadow:0 4px 14px rgba(0,40,90,.18); }
  #joy { position:fixed; left:22px; bottom:22px; width:130px; height:130px; border-radius:50%;
         background:rgba(255,255,255,.22); border:2px solid rgba(255,255,255,.5); z-index:10; touch-action:none; }
  #joyKnob { position:absolute; left:50%; top:50%; width:56px; height:56px; border-radius:50%;
             background:rgba(255,255,255,.9); transform:translate(-50%,-50%); box-shadow:0 4px 12px rgba(0,40,90,.35); pointer-events:none; }

  /* quiz */
  #quiz .card { padding:0; overflow:hidden; }
  #qHead { height:120px; background-size:cover; background-position:center; position:relative; }
  #qHead .tag { position:absolute; left:12px; bottom:10px; background:rgba(26,95,180,.92); color:#fff;
                padding:6px 14px; border-radius:999px; font-weight:800; font-size:14px; }
  #qHead .num { position:absolute; right:12px; bottom:10px; background:rgba(255,255,255,.92); color:#1a5fb4;
                padding:6px 12px; border-radius:999px; font-weight:800; font-size:14px; }
  #qBody { padding:18px; }
  #qText { font-size:20px; font-weight:700; color:#223; min-height:56px; display:flex; align-items:center; justify-content:center; }
  #qOpts { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  #qOpts button { padding:16px 8px; font-size:20px; font-weight:800; border:2px solid #cfe3f7; background:#f4f9ff;
                  border-radius:14px; color:#1a5fb4; cursor:pointer; transition:transform .08s; }
  #qOpts button:active { transform:scale(.96); }
  #qOpts button.ok { background:#38c172; color:#fff; border-color:#2c9c5c; }
  #qOpts button.bad { background:#e05252; color:#fff; border-color:#c04040; opacity:.7; }
  #qStars { margin-top:12px; font-size:15px; color:#777; font-weight:600; }
  #mascot { position:absolute; left:-8px; top:-54px; width:92px; pointer-events:none; filter:drop-shadow(0 4px 8px rgba(0,0,0,.25)); }

  /* finish */
  #fin h1 { color:#1a5fb4; font-size:26px; margin-bottom:6px; }
  #finStars { font-size:40px; margin:8px 0; }
  #lb { margin-top:14px; text-align:left; max-height:220px; overflow-y:auto; }
  #lb .row { display:flex; justify-content:space-between; padding:8px 12px; border-radius:10px; font-weight:700; color:#334; }
  #lb .row:nth-child(odd){ background:#f2f8ff; }
  #lb .row.me { background:#ffe9c7; }

  #load { background:#7cc0ec; flex-direction:column; gap:14px; color:#fff; font-weight:800; font-size:18px; z-index:40; }
  #bar { width:min(300px,70vw); height:12px; background:rgba(255,255,255,.35); border-radius:99px; overflow:hidden; }
  #barIn { height:100%; width:0%; background:#fff; border-radius:99px; transition:width .2s; }

  .toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:rgba(26,95,180,.94); color:#fff;
           padding:12px 22px; border-radius:999px; font-weight:800; font-size:17px; z-index:30; box-shadow:0 8px 24px rgba(0,40,90,.35);
           animation:pop .3s ease; white-space:nowrap; }
  @keyframes pop { from { transform:translateX(-50%) scale(.6); opacity:0; } }
  .hidden { display:none !important; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" class="hidden">
  <div class="pill" id="hudStars">⭐ 0</div>
  <div class="pill" id="hudIsl">🏝 1/5</div>
  <div class="pill" id="hudTime">⏱ 0:00</div>
</div>
<div id="joy" class="hidden"><div id="joyKnob"></div></div>

<div id="load" class="ov"><div>Bilim orollari yuklanmoqda…</div><div id="bar"><div id="barIn"></div></div></div>

<div id="start" class="ov hidden">
  <div class="card">
    <h1>🏝 ZIYOKOR QUEST</h1>
    <p class="sub">Bilim orollari bo'ylab sayohat — 5 orol, 20 jumboq!</p>
    <input id="inpName" type="text" maxlength="24" placeholder="Isming nima?">
    <div class="grades">
      <button data-g="2">2-sinf</button>
      <button data-g="3" class="sel">3-sinf</button>

</div>

<div id="quiz" class="ov hidden">
  <div class="card" style="position:relative">
    <img id="mascot" src="assets/final/mascot.png" alt="">
    <div id="qHead"><span class="tag" id="qTag"></span><span class="num" id="qNum"></span></div>
    <div id="qBody">
      <div id="qText"></div>
      <div id="qOpts"></div>
      <div id="qStars"></div>

  </div>
</div>

<div id="fin" class="ov hidden">
  <div class="card">
    <h1>🎉 TABRIKLAYMIZ!</h1>
    <div>Sen Bilim minorasiga yetib kelding!</div>
    <div id="finStars"></div>
    <div id="finInfo" style="color:#666;font-weight:600"></div>
    <div id="lb"></div>
    <button class="big" style="margin-top:14px" onclick="location.reload()">YANA O'YNASH 🔄</button>
  </div>
</div>

<script type="importmap">{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ================= CONFIG ================= */
const DB = 'https://ziyokor-qabul-default-rtdb.firebaseio.com';
const ISLANDS = [
  { key:'amal',   name:"Amallar oroli",     img:'assets/final/isl_amal.jpg' },
  { key:'geo',    name:"Geometriya qal'asi", img:'assets/final/isl_geo.jpg' },
  { key:'kasr',   name:"Ulushlar g'ori",    img:'assets/final/isl_kasr.jpg' },
  { key:'masala', name:"Masalalar shahri",  img:'assets/final/isl_masala.jpg' },
  { key:'final',  name:"Bilim minorasi",    img:'assets/final/isl_final.jpg' },
];
const Q_PER_ISLAND = 4;

/* ================= AUDIO ================= */
const SND = {};
for (const n of ['welcome','barakalla','ajoyib','urinib','koprik','final'])
  SND[n] = new Audio('audio/' + n + '.mp3');
function say(n){ try { const a=SND[n]; a.currentTime=0; a.play().catch(()=>{}); } catch(e){} }
let AC=null;
function ding(freq=880, dur=.15, type='sine', vol=.25){
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.frequency.value=freq; g.gain.value=vol;
    g.gain.exponentialRampToValueAtTime(.001, AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+dur);
  }catch(e){}
}
const sfxStar = ()=>{ ding(880,.12); setTimeout(()=>ding(1320,.2),110); };
const sfxBad  = ()=>ding(180,.3,'square',.15);

/* ================= QUESTIONS ================= */
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[ri(0,a.length-1)];
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=ri(0,i); [a[i],a[j]]=[a[j],a[i]]; } return a; }
const fmt=n=>String(n).replace(/\B(?=(\d{3})+(?!\d))/g,' ');
function mkQ(q, ans, distract){
  const s=new Set([ans]); let g=0;
  const gen = distract || (()=>ans+pick([-10,-2,-1,1,2,10,ri(3,12)]));
  while(s.size<4 && g++<300){ const v=gen(); if(v!==ans && v>=0) s.add(v); }
  let b=ans; while(s.size<4){ b+=ri(1,3); s.add(b); }
  return { q, ans:fmt(ans), opts:shuffle([...s]).map(fmt) };
}
function mkQs(q, ans, opts){ return { q, ans, opts:shuffle(opts.slice()) }; } // string options
const NAMES=['Ali','Laylo','Aziz','Malika','Diyor','Zuhra','Umid','Sevara'];
const SHAPES=[['Uchburchak',3],['Kvadrat',4],['Beshburchak',5],['Oltiburchak',6]];

const GEN = {
  amal: {
    2: [
      ()=>{ const a=ri(12,79), b=ri(11,99-a); return mkQ(`${a} + ${b} = ?`, a+b); },
      ()=>{ const a=ri(30,99), b=ri(11,a-10); return mkQ(`${a} − ${b} = ?`, a-b); },
      ()=>{ const m=pick([2,3,4,5]), n=ri(3,9); return mkQ(`${m} × ${n} = ?`, m*n); },
      ()=>{ const a=ri(3,9), b=ri(3,9), c=ri(2,Math.min(9,a+b-1)); return mkQ(`${a} + ${b} − ${c} = ?`, a+b-c); },
    ],
    3: [
      ()=>{ const a=ri(120,780), b=ri(110,990-a); return mkQ(`${a} + ${b} = ?`, a+b); },
      ()=>{ const a=ri(300,990), b=ri(110,a-100); return mkQ(`${a} − ${b} = ?`, a-b); },
      ()=>{ const m=ri(3,9), n=ri(3,9); return mkQ(`${m} × ${n} = ?`, m*n); },
      ()=>{ const m=ri(3,9), n=ri(3,9); return mkQ(`${m*n} ÷ ${m} = ?`, n, ()=>n+pick([-2,-1,1,2,3])); },
    ],
    4: [
      ()=>{ const a=ri(13,98), m=ri(3,9); return mkQ(`${a} × ${m} = ?`, a*m); },
      ()=>{ const a=ri(1200,7800), b=ri(1100,9900-a); return mkQ(`${fmt(a)} + ${fmt(b)} = ?`, a+b); },
      ()=>{ const c=ri(3,9), n=ri(13,98); return mkQ(`${c*n} ÷ ${c} = ?`, n); },
      ()=>{ const a=ri(3,9), b=ri(3,9), c=ri(4,30); return mkQ(`${c} + ${a} × ${b} = ?`, c+a*b, ()=>pick([(c+a)*b, c+a*b+pick([-10,-1,1,10]), c+a+b])); },
    ],
  },
  geo: {
    2: [
      ()=>{ const [n,k]=pick(SHAPES); return mkQ(`${n}ning nechta tomoni bor?`, k, ()=>ri(3,8)); },
      ()=>{ const [n,k]=pick(SHAPES); return mkQ(`${n}ning nechta uchi (burchagi) bor?`, k, ()=>ri(3,8)); },
      ()=>{ const a=ri(2,9); return mkQ(`Tomoni ${a} sm bo'lgan kvadratning perimetri necha sm?`, 4*a, ()=>pick([2*a,3*a,a*a,4*a+pick([-4,4])])); },
      ()=>mkQs(`Doiraning nechta burchagi bor?`, '0', ['0','1','2','4']),
    ],
    3: [
      ()=>{ const a=ri(3,12); return mkQ(`Tomoni ${a} sm bo'lgan kvadratning perimetri necha sm?`, 4*a, ()=>pick([2*a,3*a,a*a])); },
      ()=>{ const a=ri(4,12), b=ri(2,a-1); return mkQ(`Bo'yi ${a} sm, eni ${b} sm bo'lgan to'g'ri to'rtburchakning perimetri necha sm?`, 2*(a+b), ()=>pick([a+b,a*b,2*a+b])); },
      ()=>{ const [n,k]=pick([['Yettiburchak',7],['Sakkizburchak',8],['Oltiburchak',6],['Beshburchak',5]]); return mkQ(`${n}ning nechta tomoni bor?`, k, ()=>ri(5,9)); },
      ()=>{ const a=ri(3,10); return mkQ(`Perimetri ${4*a} sm bo'lgan kvadratning tomoni necha sm?`, a, ()=>a+pick([-2,-1,1,2])); },
    ],
    4: [
      ()=>{ const a=ri(5,20), b=ri(3,a-1); return mkQ(`Bo'yi ${a} sm, eni ${b} sm bo'lgan to'g'ri to'rtburchakning perimetri necha sm?`, 2*(a+b), ()=>pick([a+b,a*b,2*a+b])); },
      ()=>{ const a=ri(3,12); return mkQ(`Tomoni ${a} sm bo'lgan kvadratning yuzi necha kv. sm?`, a*a, ()=>pick([4*a,2*a,a*a+pick([-a,a])])); },
      ()=>{ const a=ri(4,12), b=ri(2,a-1); return mkQ(`Bo'yi ${a} sm, eni ${b} sm bo'lgan to'g'ri to'rtburchakning yuzi necha kv. sm?`, a*b, ()=>pick([2*(a+b),a+b,a*b+pick([-b,b])])); },
      ()=>{ const a=ri(4,15); return mkQ(`Yuzi ${a*a} kv. sm bo'lgan kvadratning tomoni necha sm?`, a, ()=>a+pick([-2,-1,1,2])); },
    ],
  },
  kasr: {
    2: [
      ()=>{ const n=2*ri(4,24); return mkQ(`${n} sonining yarmi nechaga teng?`, n/2, ()=>n/2+pick([-2,-1,1,2,5])); },
      ()=>{ const n=ri(6,45); return mkQ(`${n} sonining ikki baravari nechaga teng?`, 2*n); },
      ()=>{ const e=2*ri(3,20); return mkQs(`Qaysi son juft?`, String(e), [String(e),String(2*ri(3,20)+1),String(2*ri(3,20)+1),String(2*ri(21,40)+1)]); },
      ()=>mkQs(`Yarim soat necha minut?`, '30', ['30','60','15','45']),
    ],
    3: [
      ()=>{ const d=pick([2,3,4]), k=ri(3,12); return mkQ(`${d*k} sonining 1/${d} qismi nechaga teng?`, k, ()=>k+pick([-3,-2,-1,1,2,3])); },
      ()=>{ const d=pick([2,3,4,5]), k=ri(2,9); return mkQ(`Butunning 1/${d} qismi ${k} ga teng. Butun son nechaga teng?`, d*k, ()=>pick([k+d,d*k+pick([-d,d]),k*2])); },
      ()=>mkQs(`Chorak soat necha minut?`, '15', ['15','25','30','45']),
      ()=>{ const n=3*ri(4,15); return mkQ(`${n} sonining uchdan bir qismi nechaga teng?`, n/3, ()=>n/3+pick([-2,-1,1,2])); },
    ],
    4: [
      ()=>{ const d=pick([3,4,5,8]), num=ri(1,d-1), k=ri(3,12); return mkQ(`${d*k} sonining ${num}/${d} qismi nechaga teng?`, num*k, ()=>pick([k,(num+1)*k,num*k+pick([-k,k])])); },
      ()=>mkQs(`1/2 va 1/4 kasrlarning qaysi biri katta?`, '1/2', ['1/2','1/4','Teng','Aytib boʻlmaydi']),
      ()=>{ const d=pick([3,4,5]), k=ri(3,10); return mkQ(`Butunning 1/${d} qismi ${k} ga teng. Butun son nechaga teng?`, d*k, ()=>pick([k+d,d*k+pick([-d,d])])); },
      ()=>{ const d=pick([5,8,10]), num=ri(2,d-1); const others=shuffle([1,2,3,4,5,6,7,8,9].filter(x=>x<d&&x!==num)).slice(0,3); return mkQs(`Qaysi kasr katta: maxrajlari bir xil bo'lsa?  ${others.concat(num).sort(()=>0).map(x=>x+'/'+d).join(', ')}`, `${Math.max(num,...others)}/${d}`, [num,...others].map(x=>x+'/'+d)); },
    ],
  },
  masala: {
    2: [
      ()=>{ const N=pick(NAMES), a=ri(20,60), b=ri(5,a-5); return mkQ(`${N}da ${a} ta olma bor edi. U ${b} tasini do'stlariga berdi. Nechta olma qoldi?`, a-b, ()=>pick([a+b,a-b+pick([-2,-1,1,2,10])])); },
      ()=>{ const a=ri(15,60), b=ri(10,39); return mkQ(`Do'konda ${a} ta daftar bor edi. Yana ${b} ta keltirildi. Endi do'konda nechta daftar bor?`, a+b, ()=>pick([a-b>0?a-b:a+b+5,a+b+pick([-10,-1,1,10])])); },
      ()=>{ const m=pick([2,3,4,5]), n=ri(2,6); return mkQ(`Bitta savatda ${m} ta nok bor. ${n} ta savatda jami nechta nok bor?`, m*n, ()=>pick([m+n,m*n+pick([-m,m])])); },
      ()=>{ const N=pick(NAMES), a=ri(5,20), b=ri(3,15); return mkQ(`${N}da ${a} ta qizil va ${b} ta ko'k shar bor. Jami nechta shar bor?`, a+b); },
    ],
    3: [
      ()=>{ const N=pick(NAMES), a=ri(2,9)*1000, b=ri(2,9)*1000; return mkQ(`${N} ${fmt(a)} so'mga non va ${fmt(b)} so'mga sut sotib oldi. Jami necha so'm to'ladi?`, a+b, ()=>pick([a+b+1000,a+b-1000,Math.abs(a-b)||a+b+2000])); },
      ()=>{ const m=ri(4,9), n=ri(3,9); return mkQ(`Bitta qutida ${m} ta qalam bor. ${n} ta qutida jami nechta qalam bor?`, m*n, ()=>pick([m+n,m*n+pick([-m,m,-n,n])])); },
      ()=>{ const c=ri(2,8)*1000; return mkQ(`Kitob narxi ${fmt(c)} so'm. ${pick(NAMES)} sotuvchiga 10 000 so'm berdi. Qaytim necha so'm?`, 10000-c, ()=>pick([c,10000-c+1000,10000-c-1000||500])); },
      ()=>{ const k=ri(3,9), n=ri(3,8); return mkQ(`${k*n} ta o'quvchi ${n} ta qatorga teng bo'lindi. Har bir qatorda nechta o'quvchi bor?`, k, ()=>k+pick([-2,-1,1,2])); },
    ],
    4: [
      ()=>{ const v=pick([60,70,80,90]), t=ri(2,5); return mkQ(`Mashina soatiga ${v} km tezlik bilan yuradi. U ${t} soatda necha km yo'l bosadi?`, v*t, ()=>pick([v+t,v*t+pick([-v,v,-10,10])])); },
      ()=>{ const v=pick([50,60,70,80]), t=ri(2,4); return mkQ(`Avtobus ${v*t} km yo'lni ${t} soatda bosib o'tdi. Uning tezligi soatiga necha km?`, v, ()=>v+pick([-20,-10,10,20])); },
      ()=>{ const N=pick(NAMES), a=ri(3,9), m=ri(2,6), e=ri(5,20); return mkQ(`${N} har kuni ${a} ta misol yechadi. U ${m} kun shug'ullandi va yana ${e} ta misol yechdi. Jami nechta misol yechdi?`, a*m+e, ()=>pick([a*m,a+m+e,a*(m+1)+e])); },
      ()=>{ const n=ri(3,9), p=ri(2,6)*500; return mkQ(`Bitta daftar ${fmt(p)} so'm turadi. ${n} ta daftar necha so'm bo'ladi?`, n*p, ()=>pick([n*p+500,n*p-500,(n+1)*p])); },
    ],
  },
  final: {
    2: [
      ()=>{ const a=ri(20,50), b=ri(10,30), c=ri(5,25); return mkQ(`${a} + ${b} − ${c} = ?`, a+b-c); },
      ()=>{ const s=pick([2,5,10]), st=ri(2,5)*s; return mkQ(`Qatorni davom ettir: ${st}, ${st+s}, ${st+2*s}, ?`, st+3*s, ()=>st+3*s+pick([-s,s,1,-1])); },
      ()=>mkQs(`Eng katta ikki xonali son qaysi?`, '99', ['99','90','100','98']),
      ()=>{ const m=pick([2,3,4,5]), x=ri(2,9); return mkQ(`Qaysi sonni ${m} ga ko'paytirsak ${m*x} chiqadi?`, x, ()=>x+pick([-2,-1,1,2])); },
    ],
    3: [
      ()=>{ const a=ri(3,9), b=ri(3,9), c=ri(5,40); return mkQ(`${a} × ${b} + ${c} = ?`, a*b+c, ()=>pick([a*(b+c),a*b-c>0?a*b-c:a*b+c+5,a*b+c+pick([-10,-1,1,10])])); },
      ()=>{ const s=ri(3,9), st=ri(2,6)*s; return mkQ(`Qatorni davom ettir: ${st}, ${st+s}, ${st+2*s}, ?`, st+3*s, ()=>st+3*s+pick([-s,s,-1,1])); },
      ()=>{ const m=ri(3,9), x=ri(3,9); return mkQ(`Qaysi sonni ${m} ga ko'paytirsak ${m*x} bo'ladi?`, x, ()=>x+pick([-2,-1,1,2])); },
      ()=>{ const h=ri(9,18), d=ri(2,5); return mkQs(`Soat ${h}:00. ${d} soatdan keyin soat necha bo'ladi?`, `${h+d>24?h+d-24:h+d}:00`, [0,1,-1,2].map(o=>{let v=h+d+o; if(v>24)v-=24; return v+':00';})); },
    ],
    4: [
      ()=>{ const a=ri(4,15), b=ri(3,12), c=ri(3,9); return mkQ(`(${a} + ${b}) × ${c} = ?`, (a+b)*c, ()=>pick([a+b*c,(a+b)*c+pick([-c,c,-10,10]),a*c+b])); },
      ()=>{ const m=ri(3,9), x=ri(4,25); return mkQ(`x × ${m} = ${m*x} bo'lsa, x nechaga teng?`, x, ()=>x+pick([-3,-2,-1,1,2,3])); },
      ()=>{ const m=ri(4,12); return mkQ(`${m-2}, ${m} va ${m+2} sonlarining o'rta arifmetigi nechaga teng?`, m, ()=>m+pick([-2,-1,1,2])); },
      ()=>{ const a=ri(100,400), b=ri(2,4); return mkQ(`${a*b} sonining 1/${b} qismi nechaga teng?`, a, ()=>a+pick([-100,-10,10,100])); },
    ],
  },
};
function questionsFor(grade, islKey){
  const pool = GEN[islKey][grade];
  const idx = shuffle([0,1,2,3]);
  return idx.slice(0, Q_PER_ISLAND).map(i => pool[i]());
}

function jitterGeo(geo, amt){
  const pos = geo.attributes.position;
  for (let i=0;i<pos.count;i++){
    const x=pos.getX(i), y=pos.getY(i), z=pos.getZ(i);
    const n = Math.sin(x*2.7+z*1.9)*Math.cos(z*2.3+x*1.1);
    pos.setXYZ(i, x+n*amt, y, z+n*amt*.7);
  }
  geo.computeVertexNormals();
  return geo;
}
function billboard(tex, w, h, x, y, z){
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false }));
  s.scale.set(w,h,1); s.center.set(.5,0); s.position.set(x,y,z);
  scene.add(s); return s;
}
function safeSpot(c, minR, maxR){
  // random spot on island, kept off the central path corridor
  for (let k=0;k<12;k++){
    const a=Math.random()*Math.PI*2, rr=minR+Math.random()*(maxR-minR);
    const x=c.x+Math.cos(a)*rr, z=c.z+Math.sin(a)*rr;
    if (Math.abs(x-c.x) > 2.6) return [x,z];
  }
  return [c.x+3.2, c.z+2];
}

/* yurish mumkin bo'lgan hudud: orol disklari + ochilgan ko'prik yo'laklari */
function clampToWorld(p){
  let best=null, bestD=1e9;
  const consider=(x,z)=>{ const d=(p.x-x)**2+(p.z-z)**2; if(d<bestD){ bestD=d; best={x,z}; } };
  for (let i=0;i<5;i++){
    const c=P[i], dx=p.x-c.x, dz=p.z-c.z, d=Math.hypot(dx,dz), rr=R-.8;
    if (d<=rr) return;
    if (d>0) consider(c.x+dx/d*rr, c.z+dz/d*rr);
  }
  for (let i=0;i<4;i++){
    if (!bridgeOpen[i]) continue;
    const {a,b}=bridgeSeg[i];
    const abx=b.x-a.x, abz=b.z-a.z, len2=abx*abx+abz*abz;
    let t=((p.x-a.x)*abx+(p.z-a.z)*abz)/len2;
    t=Math.max(0,Math.min(1,t));
    const qx=a.x+abx*t, qz=a.z+abz*t;
    const lx=p.x-qx, lz=p.z-qz, ld=Math.hypot(lx,lz);
    if (ld<=1.0) return;
    consider(qx+lx/ld*1.0, qz+lz/ld*1.0);
  }
  if (best){ p.x=best.x; p.z=best.z; }
}

    g.animations[0].tracks = g.animations[0].tracks.filter(tr=>!/Hips\.position/.test(tr.name));
    actWalk = mixer.clipAction(g.animations[0]);
    actWalk.play(); actWalk.setEffectiveWeight(0);
  });
  gl2.load('assets/final/anim_idle.glb', g=>{
    if (!g.animations.length) return;
    actIdle = mixer.clipAction(g.animations[0]);
    actIdle.play(); actIdle.setEffectiveWeight(1);
  });
  mixer.addEventListener('finished', e=>{
    if (e.action===actCombo) comboUntil = 0;
  });
}, undefined, ()=>{/* sprite qoladi */});
let actIdle=null, comboUntil=0;
function heroCheer(){
  if (!actCombo) return;
  comboUntil = clock.elapsedTime + (actCombo.getClip().duration || 1.5);
  actCombo.reset().setEffectiveWeight(1).play();
}

/* --- protsedural yurish tsikli (suyaklar bilan) --- */
const W = { leg:.62, knee:.85, arm:.45, elbow:.35, foot:.22, sway:.05, twist:.08, sign:1 };
const _q = new THREE.Quaternion();
const AXX = new THREE.Vector3(1,0,0), AXY = new THREE.Vector3(0,1,0), AXZ = new THREE.Vector3(0,0,1);
function swing(name, axis, angle){
  const b = heroBones[name]; if (!b) return;
  _q.setFromAxisAngle(axis, angle);
  b.quaternion.copy(b.userData.rest.q).multiply(_q);
}
function walkPose(ph, k, t){
  if (!heroBones.Hips) return;
  const s = Math.sin(ph) * W.sign;
  // oyoqlar: qarama-qarshi fazada, tizza faqat orqadagi oyoqda bukiladi
  swing('LeftUpLeg',  AXX,  s*W.leg*k);
  swing('RightUpLeg', AXX, -s*W.leg*k);
  swing('LeftLeg',    AXX,  (Math.max(0,-s)*W.knee + .04)*k*W.sign);
  swing('RightLeg',   AXX,  (Math.max(0, s)*W.knee + .04)*k*W.sign);
  swing('LeftFoot',   AXX, (-s*W.foot)*k);
  swing('RightFoot',  AXX, ( s*W.foot)*k);
  // qo'llar: oyoqqa qarama-qarshi
  swing('LeftArm',    AXX, -s*W.arm*k);
  swing('RightArm',   AXX,  s*W.arm*k);
  swing('LeftForeArm',  AXX, -(.15+Math.max(0,-s)*W.elbow)*k*W.sign);
  swing('RightForeArm', AXX, -(.15+Math.max(0, s)*W.elbow)*k*W.sign);
  // tana: yengil burilish + nafas olish (turgan payt)
  swing('Spine',   AXY,  s*W.twist*k);
  swing('Spine02', AXX,  Math.sin(t*2)*.03*(1-k));
  swing('Head',    AXY, -s*W.twist*.6*k);
  // son: yuqoriga-pastga qadam ritmi + yon tebranish
  const h = heroBones.Hips;
  h.position.copy(h.userData.rest.p);
  h.position.y += (Math.abs(Math.sin(ph*2))-.5)*bobAmp*k;
  h.quaternion.copy(h.userData.rest.q);
  _q.setFromAxisAngle(AXZ, s*W.sway*k); h.quaternion.multiply(_q);
}

/* confetti */
let confetti = null;
function startConfetti(){
  const N=350, pos=new Float32Array(N*3), vel=[];
  const c=P[4];
  for(let i=0;i<N;i++){
    pos[i*3]=c.x+(Math.random()-.5)*2; pos[i*3+1]=14+Math.random()*4; pos[i*3+2]=c.z+(Math.random()-.5)*2;
    vel.push([(Math.random()-.5)*.25, Math.random()*.1+.05, (Math.random()-.5)*.25]);
  }
  const g=new THREE.BufferGeometry(); g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({ size:.45, vertexColors:false, color:0xffffff });
  // multi-color: 3 point clouds
  confetti=[];
  for (const col of [0xff6a3d, 0xffd43b, 0x38c172, 0x4a9de0]){
    const gg=g.clone();
    const pts=new THREE.Points(gg, new THREE.PointsMaterial({ size:.4, color:col }));
    pts.userData.vel = vel.map(v=>[v[0]*(Math.random()+.5), v[1], v[2]*(Math.random()+.5)]);
    scene.add(pts); confetti.push(pts);
  }
}

/* camera */
function camTarget(){
  return { pos: new THREE.Vector3(hero.position.x, hero.position.y+9.5, hero.position.z+14),
           look: new THREE.Vector3(hero.position.x, hero.position.y+2.5, hero.position.z-4) };
}
{ const t=camTarget(); camera.position.copy(t.pos); }

/* ================= GAME FLOW ================= */
const $ = id=>document.getElementById(id);
const toast = (msg, ms=1800)=>{
  const d=document.createElement('div'); d.className='toast'; d.textContent=msg;
  document.body.appendChild(d); setTimeout(()=>d.remove(), ms);
};

const solved = [false,false,false,false,false];

function solvedGuard(i){
  S.phase='quiz';
  openQuiz(i, ()=>{ solved[i]=true; buildBridge(i); });
}

function buildBridge(i){
  S.phase='bridge';
  say('koprik');
  gates[i].sign.material.map.dispose?.();
  gates[i].sign.visible=false;
  const planks = bridges[i];
  planks.forEach((p,k)=>{
    setTimeout(()=>{
      p.visible=true; p.position.y=1.5; p.userData.drop=true;
      if (k===planks.length-1){
        setTimeout(()=>{
          bridgeOpen[i]=true;
          S.phase='idle';
          toast("Ko'prik qurildi — o'tishing mumkin! 🌉");
        }, 400);
      }
    }, k*110);
  });
}

function finish(){
  S.phase='final';
  say('final');
  heroCheer();
  startConfetti();
  const dt = Math.round((Date.now()-S.t0)/1000);
  const mm=Math.floor(dt/60), ss=dt%60;
  $('finStars').textContent = `⭐ ${S.stars} / ${5*Q_PER_ISLAND*3}`;
  $('finInfo').textContent = `${S.name} · ${S.grade}-sinf · vaqt ${mm}:${String(ss).padStart(2,'0')}`;
  saveScore(dt).then(loadLeaderboard);
  setTimeout(()=>$('fin').classList.remove('hidden'), 2500);
}

/* ================= QUIZ UI ================= */
let quizState = null;
function openQuiz(islIdx, done){
  const qs = questionsFor(S.grade, ISLANDS[islIdx].key);
  quizState = { qs, i:0, tries:0, done, islIdx };
  $('qHead').style.backgroundImage = `url('${ISLANDS[islIdx].img}')`;
  $('qTag').textContent = ISLANDS[islIdx].name;
  $('quiz').classList.remove('hidden');
  showQ();
}
function showQ(){
  const st=quizState, q=st.qs[st.i];
  st.tries=0;
  $('qNum').textContent = `${st.i+1} / ${st.qs.length}`;
  $('qText').textContent = q.q;
  $('qStars').textContent = '3 yulduz uchun birinchi urinishda top!';
  const box=$('qOpts'); box.innerHTML='';
  for (const o of q.opts){
    const b=document.createElement('button');
    b.textContent=o;
    b.onclick=()=>answer(b, String(o)===String(q.ans));
    box.appendChild(b);
  }
}
function answer(btn, ok){
  const st=quizState;
  if (ok){
    btn.classList.add('ok');
    const got = Math.max(3-st.tries, 1);
    S.stars += got;
    $('hudStars').textContent = `⭐ ${S.stars}`;
    sfxStar();
    say(Math.random()<.5?'barakalla':'ajoyib');
    heroCheer();
    toast(`+${got} ⭐`);
    setTimeout(nextQ, 900);
  } else {
    btn.classList.add('bad'); btn.disabled=true;
    st.tries++;
    sfxBad();
    if (st.tries>=3){
      // reveal correct
      const q=st.qs[st.i];
      [...$('qOpts').children].forEach(b=>{ if(String(b.textContent)===String(q.ans)) b.classList.add('ok'); b.disabled=true; });
      toast(`To'g'ri javob: ${q.ans}`);
      setTimeout(nextQ, 1600);
    } else {
      say('urinib');
      $('qStars').textContent = st.tries===1 ? 'Endi 2 yulduz uchun!' : 'Endi 1 yulduz uchun!';
    }
  }
}
function nextQ(){
  const st=quizState;
  st.i++;
  if (st.i < st.qs.length) showQ();
  else { $('quiz').classList.add('hidden'); st.done(); }
}

/* ================= LEADERBOARD ================= */
async function saveScore(sec){
  try{
    await fetch(`${DB}/quest/scores.json`, { method:'POST',
      body: JSON.stringify({ ism:S.name, sinf:S.grade, stars:S.stars, vaqt:sec, ts:Date.now() }) });
  }catch(e){}
}
async function loadLeaderboard(){
  try{
    const r = await fetch(`${DB}/quest/scores.json`);
    const d = await r.json() || {};
    const rows = Object.values(d).sort((a,b)=> b.stars-a.stars || a.vaqt-b.vaqt).slice(0,10);
    const lb=$('lb'); lb.innerHTML='<div style="font-weight:900;color:#1a5fb4;padding:6px 12px">🏆 Eng zoʻr sayohatchilar</div>';
    rows.forEach((row,i)=>{
      const el=document.createElement('div'); el.className='row';
      if (row.ism===S.name && row.stars===S.stars) el.classList.add('me');
      el.innerHTML = `<span>${['🥇','🥈','🥉'][i]||(i+1)+'.'} ${row.ism} <small style="color:#888">${row.sinf}-sinf</small></span><span>⭐ ${row.stars}</span>`;
      lb.appendChild(el);
    });
  }catch(e){}
}

/* ================= INPUT ================= */
document.querySelectorAll('.grades button').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('.grades button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); S.grade=+b.dataset.g; };
});
$('inpName').value = localStorage.getItem('zq_name')||'';
const IS_TOUCH = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
$('btnStart').onclick=()=>{
  const n=$('inpName').value.trim();
  if(!n){ $('inpName').focus(); $('inpName').placeholder='Avval ismingni yoz 🙂'; return; }

  toast(IS_TOUCH ? "Joystik bilan boshqar! Savol darvozasini top 🎯" : "⬆️⬇️⬅️➡️ (yoki WASD) bilan yur! Savol darvozasini top 🎯", 3500);
};

/* --- boshqaruv: klaviatura + joystik --- */
const keys = {};
addEventListener('keydown', e=>{
  keys[e.key.toLowerCase()]=true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

const joyVec = {x:0, z:0};
{
  const joy=$('joy'), knob=$('joyKnob');
  let active=false;
  const setKnob=(dx,dy)=>{ knob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; };
  const update=(t)=>{
    const r=joy.getBoundingClientRect();
    let dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
    const d=Math.hypot(dx,dy), m=r.width/2-14;
    if (d>m){ dx=dx/d*m; dy=dy/d*m; }
    setKnob(dx,dy);
    joyVec.x=dx/m; joyVec.z=dy/m;
  };
  joy.addEventListener('touchstart', e=>{ active=true; update(e.touches[0]); e.preventDefault(); }, {passive:false});
  joy.addEventListener('touchmove',  e=>{ if(active) update(e.touches[0]); e.preventDefault(); }, {passive:false});
  const end=()=>{ active=false; joyVec.x=joyVec.z=0; setKnob(0,0); };
  joy.addEventListener('touchend', end); joy.addEventListener('touchcancel', end);
}
function inputVec(){
  let x=0, z=0;
  if (keys['arrowup']||keys['w'])    z-=1;
  if (keys['arrowdown']||keys['s'])  z+=1;
  if (keys['arrowleft']||keys['a'])  x-=1;
  if (keys['arrowright']||keys['d']) x+=1;
  x+=joyVec.x; z+=joyVec.z;
  const l=Math.hypot(x,z);
  if (l>1){ x/=l; z/=l; }
  return { x, z, l: Math.min(1,l) };
}

/* timer */
setInterval(()=>{
  if(!S.t0 || S.phase==='final') return;
  const dt=Math.round((Date.now()-S.t0)/1000);
  $('hudTime').textContent=`⏱ ${Math.floor(dt/60)}:${String(dt%60).padStart(2,'0')}`;
},1000);

/* ================= LOOP ================= */
function resize(){
  const w=innerWidth, h=innerHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

const clock=new THREE.Clock();
let bob=0, walkVel=0, walkBlend=0;
function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(), .05);
  // erkin yurish — klaviatura/joystik, silliq tezlanish + burilish
  const iv = (S.phase==='idle') ? inputVec() : {x:0,z:0,l:0};
  if (iv.l > .08){
    const head = Math.atan2(iv.x, iv.z);
    let diff = head - hero.rotation.y;
    diff = ((diff + Math.PI) % (Math.PI*2) + Math.PI*2) % (Math.PI*2) - Math.PI;
    hero.rotation.y += diff * Math.min(1, 10*dt);
    const targetV = 6.2 * iv.l;
    walkVel += (targetV - walkVel) * Math.min(1, 8*dt);
    const p = hero.position;
    p.x += iv.x/(iv.l||1) * walkVel * dt;
    p.z += iv.z/(iv.l||1) * walkVel * dt;
    clampToWorld(p);
    bob += dt*(4 + walkVel*1.1);
    walkBlend = Math.min(1, walkBlend + 5*dt);
    if (heroSprite) heroSprite.position.y = 2.05 + Math.abs(Math.sin(bob))*.25;
  } else {
    walkVel *= Math.max(0, 1-10*dt);
    walkBlend = Math.max(0, walkBlend - 4*dt);
  }
  // triggerlar: darvoza, minora, yangi orolga kirish
  if (S.phase==='idle'){
    const hp = hero.position;
    const i = S.isl;
    if (i<4 && !solved[i]){
      const g = gates[i].group.position;
      if (Math.hypot(hp.x-g.x, hp.z-g.z) < 2.6){
        solvedGuard(i);
      }
    } else if (i===4 && !solved[4]){
      const c = P[4];
      if (Math.hypot(hp.x-c.x, hp.z-(c.z-2)) < 5){
        S.phase='quiz';
        toast('Bilim minorasi seni kutmoqda!');
        setTimeout(()=>openQuiz(4, ()=>{ solved[4]=true; finish(); }), 700);
      }
    }
    const ni = S.isl+1;
    if (ni<5 && bridgeOpen[S.isl]){
      const c = P[ni];
      if (Math.hypot(hp.x-c.x, hp.z-c.z) < R-1.5){
        S.isl = ni;
        $('hudIsl').textContent = `🏝 ${S.isl+1}/5`;
        toast(ISLANDS[S.isl].name + 'ga xush kelibsiz!');
      }
    }
  }
  // skelet animatsiyasi: walk/idle kliplar aralashmasi, cheer paytida ular o'chadi
  if (mixer){
    const comboOn = clock.elapsedTime < comboUntil;
    if (actWalk){
      actWalk.setEffectiveWeight(comboOn ? 0 : walkBlend);
      actWalk.timeScale = .55 + walkVel*.2;
    }
    if (actIdle) actIdle.setEffectiveWeight(comboOn ? 0 : 1-walkBlend);
    mixer.update(dt);
  }
  // zaxira: klip yuklanmagan bo'lsa protsedural yurish
  if (heroBody && !actWalk && !(clock.elapsedTime < comboUntil)){
    walkPose(bob, walkBlend, clock.elapsedTime);
  }
  // plank drop animation
  for (const planks of bridges) for (const pl of planks){
    if (pl.userData.drop){
      pl.position.y = Math.max(-.12, pl.position.y - 6*dt);
      if (pl.position.y<=-.12) pl.userData.drop=false;
    }
  }
  // tower star spin
  if (window._tower){ window._tower.userData.star.rotation.y += dt*1.5; }
  // gate signs pulse
  const t=clock.elapsedTime;
  gates.forEach(g=>{ if(g.sign.visible) g.sign.scale.setScalar(1.5+Math.sin(t*3)*.15); });
  // bezaklar: aylanish, suzish, orbit
  for (const s of spinners) s.obj.rotation.y += s.speed*dt;
  for (const f of floaters){
    f.obj.position.y = f.y0 + Math.sin(t*f.sp+f.ph)*f.amp;
    const ob=f.obj.userData.orbit;
    if (ob){
      f.obj.position.x = ob.cx + Math.cos(t*ob.sp+ob.ph)*ob.r;
      f.obj.position.z = ob.cz + Math.sin(t*ob.sp+ob.ph)*ob.r;
    }
  }
  // bulutlar oqishi
  for (const cl of clouds){
    cl.position.x += cl.userData.drift*dt;
    if (cl.position.x > 95) cl.position.x = -95;
    if (cl.position.x < -95) cl.position.x = 95;
  }
  // confetti
  if (confetti) for (const pts of confetti){
    const pos=pts.geometry.attributes.position, vel=pts.userData.vel;
    for(let i=0;i<vel.length;i++){
      pos.array[i*3]+=vel[i][0]; pos.array[i*3+1]+=vel[i][1]-=.004; pos.array[i*3+2]+=vel[i][2];
      if(pos.array[i*3+1]<0){ pos.array[i*3+1]=14+Math.random()*4; vel[i][1]=Math.random()*.1+.05; }
    }
    pos.needsUpdate=true;
  }
  // camera follow
  const ct=camTarget();
  camera.position.lerp(ct.pos, 1-Math.pow(.001,dt));
  camera.lookAt(ct.look);
  renderer.render(scene,camera);
}
tick();
window.__zq = { scene, camera, renderer, hero, S };
</script>
